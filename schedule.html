<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="社内スケジュール">
<title>社内スケジュール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;}
.app{max-width:100%;padding:12px;}
.header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;background:#fff;padding:10px 14px;border-radius:10px;border:1px solid #e0e0d8;}
.month-title{font-size:18px;font-weight:700;color:#1a1a1a;min-width:120px;text-align:center;}
.nav-btn{background:#fff;border:1px solid #d0d0c8;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:15px;color:#444;}
.nav-btn:hover{background:#f0f0ea;}
.add-btn{margin-left:auto;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;}
.add-btn:hover{background:#333;}
.sync-btn{background:#fff;border:1px solid #d0d0c8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:#555;}
.sync-btn:hover{background:#f0f0ea;}
.status{font-size:11px;color:#888;}
.status.ok{color:#3B6D11;}.status.err{color:#A32D2D;}.status.loading{color:#854F0B;}
.members{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:#fff;border-radius:10px;border:1px solid #e0e0d8;}
.member-tag{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:opacity .15s;}
.member-tag.inactive{opacity:0.25;}
.calendar-wrap{overflow-x:auto;}
.calendar{border:1px solid #d8d8d0;border-radius:12px;overflow:hidden;min-width:680px;background:#fff;}
.cal-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.cal-head-cell{font-size:11px;font-weight:700;text-align:center;padding:7px 2px;color:#888;background:#f8f8f4;border-right:1px solid #e8e8e0;border-bottom:1px solid #e8e8e0;}
.cal-head-cell:last-child{border-right:none;}
.cal-head-cell.sun{color:#c0392b;}.cal-head-cell.sat{color:#2471a3;}
.cal-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.cal-row:last-child .cal-cell{border-bottom:none;}
.cal-cell{border-right:1px solid #e8e8e0;border-bottom:1px solid #e8e8e0;min-height:90px;padding:3px;background:#fff;cursor:pointer;}
.cal-cell:last-child{border-right:none;}
.cal-cell:hover{background:#fafaf6;}
.cal-cell.other-month{background:#f8f8f4;}
.cal-cell.today{background:#fffdf0;}
.cal-cell.today .date-num{background:#c0392b;color:#fff;border-radius:50%;}
.date-num{font-size:11px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.date-num.sun{color:#c0392b;}.date-num.sat{color:#2471a3;}
.ev-rows{display:flex;flex-direction:column;gap:1px;}
.ev-row{display:flex;align-items:center;gap:2px;min-height:13px;cursor:pointer;padding:0 1px;border-radius:2px;}
.ev-row:hover{opacity:0.7;}
.ev-row-sub{display:flex;align-items:center;gap:2px;min-height:13px;cursor:pointer;padding-left:7px;border-radius:2px;}
.ev-row-sub:hover{opacity:0.7;}
.m-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.m-label{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;line-height:1.4;padding:0 3px;border-radius:2px;}
.m-corner{font-size:8px;color:#bbb;flex-shrink:0;line-height:1.4;margin-right:1px;}
.ev-empty{display:flex;align-items:center;gap:2px;min-height:13px;}
.m-dot-e{width:5px;height:5px;border-radius:50%;background:#d8d8d0;flex-shrink:0;}
.m-label-e{font-size:9px;color:#bbb;line-height:1.4;}
.band-wrap{height:13px;display:flex;align-items:center;cursor:pointer;}
.band-wrap:hover{opacity:0.7;}
.band{height:10px;flex:1;display:flex;align-items:center;padding:0 4px;}
.band-label{font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:700;line-height:1;}
.band-start{border-radius:4px 0 0 4px;}
.band-mid{border-radius:0;}
.band-end{border-radius:0 4px 4px 0;}
.band-solo{border-radius:4px;}
/* ポップアップ */
.popup{position:fixed;background:#fff;border:1px solid #d0d0c8;border-radius:12px;padding:16px;min-width:260px;max-width:320px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.popup-date{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e8e8e0;}
.popup-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0e8;cursor:pointer;}
.popup-item:last-of-type{border-bottom:none;}
.popup-item:hover{opacity:0.75;}
.popup-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.popup-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px;}
.popup-sub{font-size:12px;color:#888;}
.popup-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.popup-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;display:inline-block;}
.popup-add{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #e8e8e0;font-size:13px;color:#888;cursor:pointer;}
.popup-add:hover{color:#1a1a1a;}
.popup-none{font-size:13px;color:#aaa;padding:6px 0;}
/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:340px;border:1px solid #e0e0d8;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1a1a1a;}
.form-row{margin-bottom:11px;}
.form-label{font-size:12px;color:#888;margin-bottom:4px;display:block;font-weight:600;}
.form-hint{font-size:10px;color:#bbb;margin-top:2px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1px solid #d0d0c8;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;font-family:inherit;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#888;}
.form-dates{display:flex;gap:8px;align-items:center;}
.form-dates input{flex:1;}
.form-dates span{font-size:12px;color:#888;flex-shrink:0;}
/* 同行者チェックボックス */
.accompany-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
.accompany-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #e0e0d8;border-radius:8px;cursor:pointer;transition:background .1s;}
.accompany-item:hover{background:#f5f5f0;}
.accompany-item.selected{border-color:transparent;}
.accompany-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.accompany-item label{font-size:13px;cursor:pointer;font-weight:500;}
.modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.modal-btns button{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #d0d0c8;background:#fff;color:#1a1a1a;}
.modal-btns button:hover{background:#f5f5f0;}
.modal-btns .primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.modal-btns .primary:hover{background:#333;}
.modal-btns .danger{color:#c0392b;border-color:#e8c0b8;}

<body>
<div class="app">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-title" id="month-title"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
    <button class="sync-btn" onclick="confirmReload()">🔄 更新</button>
    <span class="status" id="status">読込中...</span>
    <button class="add-btn" onclick="openAddModal(null)">＋ 予定を追加</button>
  </div>
  <div class="members" id="members-bar"></div>
  <div class="calendar-wrap">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div id="popup" class="popup" style="display:none;"></div>

<div id="modal-bg" class="modal-bg" style="display:none;">
  <div class="modal">
    <h3 id="modal-title">予定を追加</h3>
    <div class="form-row">
      <label class="form-label">タイトル</label>
      <input type="text" id="f-title" placeholder="例：現場打ち合わせ"/>
    </div>
    <div class="form-row">
      <label class="form-label">日付（複数日は終了日も入力）</label>
      <div class="form-dates">
        <input type="date" id="f-date"/>
        <span>〜</span>
        <input type="date" id="f-end-date"/>
      </div>
      <div class="form-hint">※1日だけの場合は終了日は空欄でOK</div>
    </div>
    <div class="form-row">
      <label class="form-label">担当者（メイン）</label>
      <select id="f-member"></select>
    </div>
    <div class="form-row">
      <label class="form-label">同行者（複数選択可）</label>
      <div class="accompany-grid" id="accompany-grid"></div>
    </div>
    <div class="form-row">
      <label class="form-label">メモ</label>
      <textarea id="f-note" rows="2" placeholder="任意"></textarea>
    </div>
    <div class="modal-btns">
      <button id="delete-btn" class="danger" onclick="deleteEvent()" style="display:none;">削除</button>
      <button onclick="closeModal()">キャンセル</button>
      <button class="primary" id="save-btn" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyL-HYPr3u3SmYQU20sX6VDCsfItuT0BZI96KBYfNgtKzCjpFSnK-PWdMxoUBnS0cKC/exec';

const MEMBERS=[
  {name:'穐元',  color:'#185FA5',bg:'#B5D4F4',text:'#042C53'},
  {name:'吉成',  color:'#0F6E56',bg:'#9FE1CB',text:'#04342C'},
  {name:'真壁',  color:'#993C1D',bg:'#F5C4B3',text:'#4A1B0C'},
  {name:'敏美',  color:'#854F0B',bg:'#FAC775',text:'#412402'},
  {name:'佐藤',  color:'#2E86AB',bg:'#AED9E0',text:'#1A5276'},
  {name:'下村',  color:'#993556',bg:'#F4C0D1',text:'#4B1528'},
  {name:'縫製',  color:'#534AB7',bg:'#CECBF6',text:'#26215C'},
  {name:'その他',color:'#3B6D11',bg:'#C0DD97',text:'#173404'},
  {name:'休み',  color:'#A32D2D',bg:'#F7C1C1',text:'#501313'},
];

const ACCOMPANY_MEMBERS=[
  {name:'穐元',  color:'#185FA5',bg:'#B5D4F4',text:'#042C53'},
  {name:'吉成',  color:'#0F6E56',bg:'#9FE1CB',text:'#04342C'},
  {name:'真壁',  color:'#993C1D',bg:'#F5C4B3',text:'#4A1B0C'},
  {name:'敏美',  color:'#854F0B',bg:'#FAC775',text:'#412402'},
  {name:'佐藤',  color:'#2E86AB',bg:'#AED9E0',text:'#1A5276'},
  {name:'下村',  color:'#993556',bg:'#F4C0D1',text:'#4B1528'},
  {name:'縫製',  color:'#534AB7',bg:'#CECBF6',text:'#26215C'},
  {name:'ディライト', color:'#6C3483',bg:'#D2B4DE',text:'#4A235A'},
  {name:'ナンバーエス',color:'#1A5276',bg:'#A9CCE3',text:'#154360'},
  {name:'ユーユー',   color:'#0E6655',bg:'#A2D9CE',text:'#0B5345'},
  {name:'フルライン', color:'#7D6608',bg:'#F9E79F',text:'#6D5E07'},
  {name:'ハンデックス',color:'#784212',bg:'#FAD7A0',text:'#6E2F0E'},
  {name:'相山',      color:'#1B2631',bg:'#AEB6BF',text:'#17202A'},
  {name:'その他',    color:'#3B6D11',bg:'#C0DD97',text:'#173404'},
  {name:'休み',      color:'#A32D2D',bg:'#F7C1C1',text:'#501313'},
];

let activeMembers=new Set(MEMBERS.map(m=>m.name));
let events=[];
let nextId=1;
let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth()+1;
let editingId=null;

function pad(n){return String(n).padStart(2,'0');}
function setStatus(msg,type=''){const el=document.getElementById('status');el.textContent=msg;el.className='status '+(type||'');}

async function loadFromSheet(){
  setStatus('読込中...','loading');
  try{
    const res=await fetch(GAS_URL);
    const data=await res.json();
    events=data.filter(r=>r.id&&r.date).map(r=>({
      id:String(r.id),
      date:String(r.date||'').split('T')[0],
      title:String(r.title||''),
      member:String(r.member||''),
      note:String(r.note||''),
      end_date:String(r.end_date||'').split('T')[0],
      accompanies:[
        r.accompany1,r.accompany2,r.accompany3,r.accompany4,
        r.accompany5,r.accompany6,r.accompany7
      ].map(x=>String(x||'')).filter(x=>x)
    }));
    nextId=events.length>0?Math.max(...events.map(e=>parseInt(e.id)||0))+1:1;
    setStatus('同期済み ✓','ok');render();
  }catch(e){setStatus('読込エラー','err');}
}

function confirmReload(){
  if(confirm("更新しますか？\n未保存の入力中データは消えます。")){
    loadFromSheet();
  }
}

async function postToSheet(payload){
  await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
}

function toDate(str){
  if(!str)return null;
  const [y,m,d]=String(str).split('-');
  return new Date(parseInt(y),parseInt(m)-1,parseInt(d));
}
function dateStr(y,m,d){return `${y}-${pad(m)}-${pad(d)}`;}
function isEventOnDate(ev,ds){
  if(!ev.end_date)return ev.date===ds;
  const d=toDate(ds),s=toDate(ev.date),e=toDate(ev.end_date);
  return d>=s&&d<=e;
}
function getBandPos(ev,ds){
  if(!ev.end_date)return 'solo';
  if(ev.date===ds)return 'start';
  if(ev.end_date===ds)return 'end';
  return 'mid';
}

function changeMonth(d){currentMonth+=d;if(currentMonth>12){currentMonth=1;currentYear++;}if(currentMonth<1){currentMonth=12;currentYear--;}closePopup();render();}

function render(){
  document.getElementById('month-title').textContent=`${currentYear}年 ${currentMonth}月`;
  renderMembers();renderCalendar();
}
function renderMembers(){
  document.getElementById('members-bar').innerHTML=MEMBERS.map(m=>`
    <span class="member-tag ${activeMembers.has(m.name)?'':'inactive'}"
      style="background:${m.bg};color:${m.text};border-color:${activeMembers.has(m.name)?m.color:'transparent'}"
      onclick="toggleMember('${m.name}')">${m.name}</span>`).join('');
}
function toggleMember(n){if(activeMembers.has(n))activeMembers.delete(n);else activeMembers.add(n);render();}

function renderCalendar(){
  const cal=document.getElementById('calendar');
  const today=new Date();
  const firstDay=new Date(currentYear,currentMonth-1,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth-1,0).getDate();
  const days=['日','月','火','水','木','金','土'];
  const visibleMembers=MEMBERS.filter(m=>activeMembers.has(m.name));

  let head='<div class="cal-head">';
  for(let i=0;i<7;i++){
    const cls=i===0?'sun':i===6?'sat':'';
    head+=`<div class="cal-head-cell ${cls}">${days[i]}</div>`;
  }
  head+='</div>';

  let cells=[];
  for(let i=0;i<firstDay;i++)cells.push({day:daysInPrev-firstDay+1+i,mo:currentMonth-1,other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,mo:currentMonth,other:false});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1,mo:currentMonth+1,other:true});

  let body='<div class="cal-body">';
  for(let r=0;r<cells.length/7;r++){
    body+='<div class="cal-row">';
    for(let ci=0;ci<7;ci++){
      const c=cells[r*7+ci];
      const m=c.other?(c.mo<1?12:c.mo>12?1:c.mo):currentMonth;
      const y=c.other?(c.mo<1?currentYear-1:c.mo>12?currentYear+1:currentYear):currentYear;
      const ds=dateStr(y,m,c.day);
      const isToday=today.getFullYear()===y&&today.getMonth()+1===m&&today.getDate()===c.day;
      const dow=ci%7;
      const dnCls=dow===0?'sun':dow===6?'sat':'';

      let rowsHtml='<div class="ev-rows">';
      for(const mb of visibleMembers){
        const evs=events.filter(e=>e.member===mb.name&&isEventOnDate(e,ds));
        const isAccompanyOnly=events.some(e=>e.accompanies&&e.accompanies.includes(mb.name)&&isEventOnDate(e,ds))&&evs.length===0;

        if(evs.length===0&&!isAccompanyOnly){
          rowsHtml+=`<div class="ev-empty"><div class="m-dot-e"></div><div class="m-label-e">${mb.name}</div></div>`;
        } else if(isAccompanyOnly){
          rowsHtml+=`<div class="ev-empty"><div class="m-dot-e"></div><div class="m-label-e">${mb.name}</div></div>`;
        } else {
          for(const ev of evs){
            if(ev.end_date){
              const pos=getBandPos(ev,ds);
              const rClass=pos==='start'?'band-start':pos==='end'?'band-end':pos==='solo'?'band-solo':'band-mid';
              const label=pos==='start'?`${mb.name}：${ev.title}`:'';
              rowsHtml+=`<div class="band-wrap" onclick="openEditModal('${ev.id}',event)">
                <div class="band ${rClass}" style="background:${mb.color};">
                  <span class="band-label">${label}</span>
                </div>
              </div>`;
            } else {
              rowsHtml+=`<div class="ev-row" onclick="openEditModal('${ev.id}',event)">
                <div class="m-dot" style="background:${mb.color};"></div>
                <div class="m-label" style="color:${mb.text};background:${mb.bg};">${mb.name}：${ev.title}</div>
              </div>`;
            }
            // 同行者を全員分字下げ表示
            if(ev.accompanies&&ev.accompanies.length>0){
              const names=ev.accompanies.join('・');
              rowsHtml+=`<div class="ev-row-sub" onclick="openEditModal('${ev.id}',event)">
                <span class="m-corner">└</span>
                <div class="m-label" style="color:${mb.text};background:${mb.bg};">${names}（同行）</div>
              </div>`;
            }
          }
        }
      }
      rowsHtml+='</div>';

      body+=`<div class="cal-cell ${c.other?'other-month':''} ${isToday?'today':''}" onclick="showPopup('${ds}',event)">
        <div class="date-num ${dnCls}">${c.day}</div>
        ${rowsHtml}
      </div>`;
    }
    body+='</div>';
  }
  body+='</div>';
  cal.innerHTML=head+body;
}

function showPopup(ds,e){
  e.stopPropagation();closePopup();
  const dayEvs=events.filter(ev=>isEventOnDate(ev,ds)&&activeMembers.has(ev.member));
  const [y,mo,d]=ds.split('-');
  const dow=['日','月','火','水','木','金','土'][new Date(ds).getDay()];
  let html=`<div class="popup-date">${parseInt(mo)}月${parseInt(d)}日（${dow}）</div>`;
  if(dayEvs.length===0){html+=`<div class="popup-none">予定なし</div>`;}
  else{
    for(const ev of dayEvs){
      const mb=MEMBERS.find(x=>x.name===ev.member)||MEMBERS[0];
      const period=ev.end_date?`${ev.date} 〜 ${ev.end_date}`:'';
      const badges=(ev.accompanies&&ev.accompanies.length>0)?
        ev.accompanies.map(a=>`<span class="popup-badge" style="background:${mb.bg};color:${mb.text};">${a} 同行</span>`).join(''):'';
      html+=`<div class="popup-item" onclick="openEditModal('${ev.id}',event)">
        <div class="popup-avatar" style="background:${mb.bg};color:${mb.text};">${mb.name}</div>
        <div>
          <div class="popup-title">${ev.title}</div>
          <div class="popup-sub">${ev.member}${ev.note?'　'+ev.note:''}${period?'　'+period:''}</div>
          ${badges?`<div class="popup-badges">${badges}</div>`:''}
        </div>
      </div>`;
    }
  }
  html+=`<div class="popup-add" onclick="openAddModal('${ds}')">＋ この日に予定を追加</div>`;
  const popup=document.getElementById('popup');
  popup.innerHTML=html;popup.style.display='block';
  const rect=e.currentTarget.getBoundingClientRect();
  let left=rect.left+window.scrollX,top=rect.bottom+window.scrollY+4;
  popup.style.left=left+'px';popup.style.top=top+'px';
  setTimeout(()=>{
    const pr=popup.getBoundingClientRect();
    if(pr.right>window.innerWidth-8)popup.style.left=(window.innerWidth-pr.width-8)+'px';
    if(pr.bottom>window.innerHeight-8)popup.style.top=(rect.top+window.scrollY-pr.height-4)+'px';
  },0);
}
function closePopup(){document.getElementById('popup').style.display='none';}

function buildAccompanyGrid(selectedNames,excludeName){
  const grid=document.getElementById('accompany-grid');
  grid.innerHTML=ACCOMPANY_MEMBERS
    .filter(m=>m.name!==excludeName)
    .map(m=>{
      const checked=selectedNames&&selectedNames.includes(m.name)?'checked':'';
      const selStyle=checked?`background:${m.bg};border-color:${m.color};`:'';
      return `<div class="accompany-item ${checked?'selected':''}" id="acc-item-${m.name}" style="${selStyle}" onclick="toggleAccompany('${m.name}')">
        <input type="checkbox" id="acc-${m.name}" ${checked} onclick="event.stopPropagation();toggleAccompany('${m.name}')">
        <label for="acc-${m.name}" style="color:${checked?m.text:'#1a1a1a'};">${m.name}</label>
      </div>`;
    }).join('');
}

function toggleAccompany(name){
  const cb=document.getElementById('acc-'+name);
  const item=document.getElementById('acc-item-'+name);
  const mb=MEMBERS.find(m=>m.name===name);
  cb.checked=!cb.checked;
  if(cb.checked){
    item.classList.add('selected');
    item.style.background=mb.bg;
    item.style.borderColor=mb.color;
    item.querySelector('label').style.color=mb.text;
  } else {
    item.classList.remove('selected');
    item.style.background='';
    item.style.borderColor='';
    item.querySelector('label').style.color='#1a1a1a';
  }
}

function getSelectedAccompanies(){
  return ACCOMPANY_MEMBERS.filter(m=>{
    const cb=document.getElementById('acc-'+m.name);
    return cb&&cb.checked;
  }).map(m=>m.name);
}

function openAddModal(date){
  closePopup();editingId=null;
  document.getElementById('modal-title').textContent='予定を追加';
  document.getElementById('f-title').value='';
  document.getElementById('f-date').value=date||'';
  document.getElementById('f-end-date').value='';
  document.getElementById('f-note').value='';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('save-btn').textContent='保存';
  const firstMember=MEMBERS[0].name;
  document.getElementById('f-member').innerHTML=MEMBERS.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
  buildAccompanyGrid([],firstMember);
  document.getElementById('modal-bg').style.display='flex';
  document.getElementById('f-member').addEventListener('change',onMemberChange);
}

function onMemberChange(){
  const sel=document.getElementById('f-member').value;
  const current=getSelectedAccompanies().filter(n=>n!==sel);
  buildAccompanyGrid(current,sel);
}

function openEditModal(id,e){
  if(e)e.stopPropagation();closePopup();
  const ev=events.find(x=>String(x.id)===String(id));if(!ev)return;
  editingId=String(id);
  document.getElementById('modal-title').textContent='予定を編集';
  document.getElementById('f-title').value=ev.title;
  document.getElementById('f-date').value=ev.date;
  document.getElementById('f-end-date').value=ev.end_date||'';
  document.getElementById('f-note').value=ev.note||'';
  document.getElementById('delete-btn').style.display='inline-block';
  document.getElementById('save-btn').textContent='更新';
  document.getElementById('f-member').innerHTML=MEMBERS.map(m=>`<option value="${m.name}" ${m.name===ev.member?'selected':''}>${m.name}</option>`).join('');
  buildAccompanyGrid(ev.accompanies||[],ev.member);
  document.getElementById('modal-bg').style.display='flex';
  document.getElementById('f-member').addEventListener('change',onMemberChange);
}

function closeModal(){
  document.getElementById('modal-bg').style.display='none';
  editingId=null;
  document.getElementById('f-member').removeEventListener('change',onMemberChange);
}

async function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  const end_date=document.getElementById('f-end-date').value;
  const member=document.getElementById('f-member').value;
  const accompanies=getSelectedAccompanies();
  const note=document.getElementById('f-note').value.trim();
  if(!title||!date)return;
  const btn=document.getElementById('save-btn');
  btn.textContent='保存中...';btn.disabled=true;
  if(editingId!==null){
    const ev=events.find(x=>String(x.id)===String(editingId));
    if(ev){ev.title=title;ev.date=date;ev.end_date=end_date;ev.member=member;ev.accompanies=accompanies;ev.note=note;}
    await postToSheet({action:'edit',id:editingId,date,end_date,title,member,accompanies,note});
  } else {
    const id=String(nextId++);
    events.push({id,date,end_date,title,member,accompanies,note});
    await postToSheet({action:'add',id,date,end_date,title,member,accompanies,note});
  }
  btn.textContent='保存';btn.disabled=false;
  closeModal();render();
  setStatus('保存しました ✓','ok');
  setTimeout(()=>setStatus('同期済み ✓','ok'),2000);
}

async function deleteEvent(){
  if(editingId===null)return;
  if(!confirm('この予定を削除しますか？'))return;
  await postToSheet({action:'delete',id:editingId});
  events=events.filter(x=>String(x.id)!==String(editingId));
  closeModal();render();
  setStatus('削除しました','ok');
}

document.addEventListener('click',function(e){
  const popup=document.getElementById('popup');
  if(popup.style.display==='block'&&!popup.contains(e.target))closePopup();
});
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadFromSheet();
</script>
</body>
</html>
