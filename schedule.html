<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内スケジュール予定表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.1);--border-s:rgba(0,0,0,0.18);
  --text:#1a1a1a;--mute:#777;--hint:#aaa;
  --red:#d94040;--blue:#2563a8;--r:10px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;}
#setup-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.setup-card{background:var(--surface);border-radius:14px;border:1px solid var(--border-s);padding:32px 36px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.1);}
.setup-card h2{font-size:18px;font-weight:700;margin-bottom:6px;}
.setup-card p{font-size:13px;color:var(--mute);margin-bottom:20px;line-height:1.7;}
.setup-card label{display:block;font-size:12px;color:var(--mute);font-weight:500;margin-bottom:4px;}
.setup-card input{width:100%;font-size:13px;font-family:inherit;border:1px solid var(--border-s);border-radius:7px;padding:7px 10px;margin-bottom:14px;outline:none;background:var(--surface);color:var(--text);}
.setup-card input:focus{border-color:#7c3aed;}
.setup-hint{font-size:11px;color:var(--hint);margin-top:-10px;margin-bottom:14px;line-height:1.5;}
.btn-primary{width:100%;padding:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;background:#ede9fe;color:#4c1d95;border:1px solid #a78bfa;border-radius:8px;transition:background .15s;}
.btn-primary:hover{background:#ddd6fe;}
#status-bar{display:none;font-size:11px;padding:4px 14px;text-align:right;color:var(--hint);}
#status-bar.ok{color:#059669;}
#status-bar.err{color:var(--red);}
.board{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-s);box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;}
.bh{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--surface2);border-bottom:2.5px solid var(--red);flex-wrap:wrap;}
.hd-yr{font-size:16px;font-weight:700;color:var(--red);}
.hd-mo{font-size:24px;font-weight:700;}
.hd-ttl{font-size:20px;letter-spacing:.22em;}
.hd-nav{margin-left:auto;display:flex;gap:6px;}
.btn-nav,.btn-add{font-size:12px;padding:4px 12px;cursor:pointer;background:var(--surface);border:1px solid var(--border-s);border-radius:6px;color:var(--text);font-family:inherit;transition:background .15s;white-space:nowrap;}
.btn-nav:hover,.btn-add:hover{background:#eee;}
.cal-scroll{overflow-x:auto;}
table.cal{border-collapse:collapse;width:max-content;}
table.cal th,table.cal td{border:0.5px solid var(--border);vertical-align:top;padding:0;}
th.dh{text-align:center;padding:2px 1px;min-width:30px;background:var(--surface2);}
.dn{display:block;font-size:12px;font-weight:700;color:var(--text);}
.dn.su{color:var(--red);}
.dn.sa{color:var(--blue);}
.dw{display:block;font-size:9px;color:var(--mute);}
.dw.su{color:var(--red);background:#fdeaea;border-radius:2px;}
.dw.sa{color:var(--blue);background:#e6f0fb;border-radius:2px;}
td.rh{position:sticky;left:0;z-index:2;width:42px;min-width:42px;background:var(--surface2);font-size:11px;font-weight:500;text-align:center;vertical-align:middle;padding:2px 3px;color:var(--mute);white-space:nowrap;box-shadow:2px 0 4px rgba(0,0,0,0.07);}
th.rh-top{position:sticky;left:0;z-index:3;width:42px;min-width:42px;background:var(--surface2);box-shadow:2px 0 4px rgba(0,0,0,0.07);}
td.ec{height:68px;padding:2px;vertical-align:top;cursor:pointer;transition:background .12s;position:relative;}
td.ec:hover{background:#f0f0ff;}
td.ec:hover::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;color:#a78bfa;opacity:0.4;pointer-events:none;}
td.ec.tc{background:#fffbe6;}
td.ec.tc:hover{background:#fff3b0;}
.ev{display:block;font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;line-height:1.35;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;transition:filter .12s;}
.ev:hover{filter:brightness(.9);}
.eA{background:#ede9fe;color:#4c1d95;border-left:3px solid #7c3aed;}
.eB{background:#d1fae5;color:#064e3b;border-left:3px solid #10b981;}
.eC{background:#fce7f3;color:#831843;border-left:3px solid #ec4899;}
.eD{background:#fef3c7;color:#78350f;border-left:3px solid #f59e0b;}
.eE{background:#dcfce7;color:#14532d;border-left:3px solid #22c55e;}
.eF{background:#f1f5f9;color:#334155;border-left:3px solid #94a3b8;}
.eH{background:#fee2e2;color:#7f1d1d;border-left:3px solid #ef4444;}
.board-footer{display:flex;align-items:center;gap:12px;padding:8px 14px;border-top:0.5px solid var(--border);background:var(--surface2);flex-wrap:wrap;}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mute);}
.ld{width:12px;height:12px;border-radius:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:12px;border:1px solid var(--border-s);padding:20px 22px;width:360px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.mrow{margin-bottom:11px;}
.mrow label{display:block;font-size:11px;color:var(--mute);margin-bottom:3px;font-weight:500;}
.mrow input[type=text],.mrow input[type=date],.mrow select,.mrow textarea{width:100%;font-size:13px;font-family:inherit;border:1px solid var(--border-s);border-radius:6px;padding:6px 8px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
.mrow input:focus,.mrow select:focus,.mrow textarea:focus{border-color:#7c3aed;}
.mrow textarea{height:52px;resize:vertical;}
.date-row{display:flex;gap:6px;align-items:center;}
.date-row input{flex:1;}
.date-row span{font-size:11px;color:var(--mute);}
.cb-group{display:flex;flex-wrap:wrap;gap:5px 10px;}
.cb-group label{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text);cursor:pointer;font-weight:400;}
.mbtns{display:flex;gap:8px;margin-top:14px;}
.mbtns button{flex:1;padding:7px;font-size:13px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid var(--border-s);transition:background .15s;}
.btn-cancel{background:var(--surface);color:var(--text);}
.btn-cancel:hover{background:#f0f0f0;}
.btn-del{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5;}
.btn-del:hover{background:#fecaca;}
.btn-save{background:#ede9fe;color:#4c1d95;border-color:#a78bfa;font-weight:700;}
.btn-save:hover{background:#ddd6fe;}
.tooltip{display:none;position:fixed;background:var(--text);color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;pointer-events:none;z-index:200;max-width:200px;line-height:1.5;white-space:pre-wrap;}
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.7);z-index:300;align-items:center;justify-content:center;font-size:14px;color:var(--mute);}
#loading.show{display:flex;}
@media(max-width:600px){body{padding:8px;}.hd-ttl{display:none;}.hd-mo{font-size:20px;}}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <h2>🔧 初回設定（Firebase接続）</h2>
    <p>Firebaseコンソールで取得した接続情報を入力してください。<br>一度設定するとこのブラウザに保存され、次回から自動接続されます。</p>
    <label>API Key</label>
    <input type="text" id="cfg-apikey" placeholder="AIzaSy...">
    <label>Auth Domain</label>
    <input type="text" id="cfg-authdomain" placeholder="your-app.firebaseapp.com">
    <label>Project ID</label>
    <input type="text" id="cfg-projectid" placeholder="your-app-id">
    <label>App ID</label>
    <input type="text" id="cfg-appid" placeholder="1:123456789:web:abcdef...">
    <p class="setup-hint">※ Firebase Console → プロジェクトの設定 → マイアプリ → 構成 から確認できます。<br>詳しい手順は同梱の README.txt をご参照ください。</p>
    <button class="btn-primary" onclick="saveConfig()">接続して開始 →</button>
  </div>
</div>

<div id="main-screen" style="display:none;">
  <div id="status-bar">接続中...</div>
  <div class="board">
    <div class="bh">
      <span class="hd-yr" id="disp-year">2026</span>
      <span class="hd-mo" id="disp-month">3月</span>
      <span class="hd-ttl">予　定　表</span>
      <div class="hd-nav">
        <button class="btn-nav" onclick="changeMonth(-1)">&#8249; 前月</button>
        <button class="btn-nav" onclick="changeMonth(1)">次月 &#8250;</button>
      </div>
    </div>
    <div class="cal-scroll">
      <table class="cal" id="cal-table">
        <tr><td style="padding:24px;color:var(--mute);font-size:13px;">読込中...</td></tr>
      </table>
    </div>
    <div class="board-footer">
      
      <div class="legend" id="legend"></div>
      <div style="margin-left:auto;">
        <button class="btn-nav" style="font-size:11px;color:var(--hint);" onclick="resetConfig()">⚙ 設定変更</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">予定を追加</h3>
    <div class="mrow">
      <label>タイトル <span style="color:#e44">*</span></label>
      <input type="text" id="f-title" placeholder="例：テープカット">
    </div>
    <div class="mrow">
      <label>日付 <span style="color:#e44">*</span></label>
      <div class="date-row">
        <input type="date" id="f-date-s">
        <span>〜</span>
        <input type="date" id="f-date-e">
      </div>
      <div style="font-size:10px;color:var(--hint);margin-top:2px;">1日のみの場合、終了日は空欄でOK</div>
    </div>
    <div class="mrow">
      <label>担当者（メイン）<span style="color:#e44">*</span></label>
      <select id="f-person">
        <option value="">選択してください</option>
        <option>穐元</option><option>真壁</option><option>敏美</option>
        <option>吉成</option><option>縫製</option><option>その他</option><option>休み</option>
      </select>
    </div>
    <div class="mrow">
      <label>同行者（複数選択可）</label>
      <div class="cb-group" id="cb-companion">
        <label><input type="checkbox" value="穐元"> 穐元</label>
        <label><input type="checkbox" value="吉成"> 吉成</label>
        <label><input type="checkbox" value="真壁"> 真壁</label>
        <label><input type="checkbox" value="敏美"> 敏美</label>
        <label><input type="checkbox" value="下村"> 下村</label>
        <label><input type="checkbox" value="佐藤"> 佐藤</label>
        <label><input type="checkbox" value="縫製"> 縫製</label>
        <label><input type="checkbox" value="ディライト"> ディライト</label>
        <label><input type="checkbox" value="ナンバーエス"> ナンバーエス</label>
        <label><input type="checkbox" value="ユーユー"> ユーユー</label>
        <label><input type="checkbox" value="フルライン"> フルライン</label>
        <label><input type="checkbox" value="ハンデックス"> ハンデックス</label>
        <label><input type="checkbox" value="相山"> 相山</label>
        <label><input type="checkbox" value="左藤"> 左藤</label>
        <label><input type="checkbox" value="その他"> その他</label>
      </div>
    </div>
    <div class="mrow">
      <label>メモ</label>
      <textarea id="f-memo" placeholder="時間・場所・備考など"></textarea>
    </div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteEvent()">削除</button>
      <button class="btn-save" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div id="loading"><span>処理中...</span></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>

const HOLIDAYS={
  '2025-01-01':'元日','2025-01-13':'成人の日','2025-02-11':'建国記念の日',
  '2025-02-23':'天皇誕生日','2025-02-24':'天皇誕生日 振替','2025-03-20':'春分の日',
  '2025-04-29':'昭和の日','2025-05-03':'憲法記念日','2025-05-04':'みどりの日',
  '2025-05-05':'こどもの日','2025-05-06':'こどもの日 振替','2025-07-21':'海の日',
  '2025-08-11':'山の日','2025-09-15':'敬老の日','2025-09-23':'秋分の日',
  '2025-10-13':'スポーツの日','2025-11-03':'文化の日','2025-11-23':'勤労感謝の日',
  '2025-11-24':'勤労感謝の日 振替',
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日',
  '2026-05-06':'昭和の日 振替','2026-07-20':'海の日','2026-08-11':'山の日',
  '2026-09-21':'敬老の日','2026-09-22':'国民の休日','2026-09-23':'秋分の日',
  '2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
  '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日',
  '2027-02-23':'天皇誕生日','2027-03-21':'春分の日','2027-04-29':'昭和の日',
  '2027-05-03':'憲法記念日','2027-05-04':'みどりの日','2027-05-05':'こどもの日',
  '2027-07-19':'海の日','2027-08-11':'山の日','2027-09-20':'敬老の日',
  '2027-09-23':'秋分の日','2027-10-11':'スポーツの日','2027-11-03':'文化の日',
  '2027-11-23':'勤労感謝の日',
};
const ROWS=['吉成','穐元','真壁','敏美','縫製','その他','休み'];
const RCLASS={穐元:'eA',真壁:'eB',敏美:'eC',吉成:'eD',縫製:'eE',その他:'eF',休み:'eH'};
const RCOLORS={
  穐元:{bg:'#ede9fe',bd:'#7c3aed'},真壁:{bg:'#d1fae5',bd:'#10b981'},
  敏美:{bg:'#fce7f3',bd:'#ec4899'},吉成:{bg:'#fef3c7',bd:'#f59e0b'},
  縫製:{bg:'#dcfce7',bd:'#22c55e'},その他:{bg:'#f1f5f9',bd:'#94a3b8'},
  休み:{bg:'#fee2e2',bd:'#ef4444'},
};
const DJP=['日','月','火','水','木','金','土'];
const CFG_KEY='schedule_firebase_cfg_v1';

let curYear=2026,curMonth=3,editingId=null,db=null,events={},unsub=null;

function loadConfig(){try{return JSON.parse(localStorage.getItem(CFG_KEY));}catch(e){return null;}}

function saveConfig(){
  const cfg={
    apiKey:document.getElementById('cfg-apikey').value.trim(),
    authDomain:document.getElementById('cfg-authdomain').value.trim(),
    projectId:document.getElementById('cfg-projectid').value.trim(),
    appId:document.getElementById('cfg-appid').value.trim(),
  };
  if(!cfg.apiKey||!cfg.projectId){alert('API KeyとProject IDは必須です');return;}
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  initFirebase(cfg);
}

function resetConfig(){
  if(!confirm('設定をリセットして初回設定画面に戻りますか？'))return;
  if(unsub)unsub();
  localStorage.removeItem(CFG_KEY);
  document.getElementById('main-screen').style.display='none';
  document.getElementById('setup-screen').style.display='flex';
}

function initFirebase(cfg){
  try{
    if(firebase.apps.length){firebase.app().delete();}
    firebase.initializeApp(cfg);
    db=firebase.firestore();
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    document.getElementById('status-bar').style.display='block';
    setStatus('接続中...','');
    startListener();
  }catch(e){
    alert('Firebase接続に失敗しました。\n'+e.message);
  }
}

function startListener(){
  if(unsub)unsub();
  setStatus('読込中...','');
  unsub=db.collection('schedule_events').onSnapshot(snap=>{
    events={};
    snap.forEach(doc=>{events[doc.id]={...doc.data(),id:doc.id};});
    renderCalendar();
    setStatus('● リアルタイム同期中','ok');
  },err=>{setStatus('⚠ 接続エラー: '+err.message,'err');});
}

function setStatus(msg,cls){const el=document.getElementById('status-bar');el.textContent=msg;el.className=cls;}

function getDays(y,m){return new Date(y,m,0).getDate();}
function getDow(y,m,d){return new Date(y,m-1,d).getDay();}
function pad(n){return String(n).padStart(2,'0');}
function toDS(y,m,d){return `${y}-${pad(m)}-${pad(d)}`;}
function todayStr(){const t=new Date();return toDS(t.getFullYear(),t.getMonth()+1,t.getDate());}

function renderCalendar(){
  const days=getDays(curYear,curMonth);
  document.getElementById('disp-year').textContent=curYear;
  document.getElementById('disp-month').textContent=curMonth+'月';
  const today=todayStr();
  const evArr=Object.values(events);
  let html='<thead><tr><th class="rh-top"></th>';
  for(let d=1;d<=days;d++){
    const dow=getDow(curYear,curMonth,d);
    const sc=dow===0?'su':dow===6?'sa':'';
    const ds=toDS(curYear,curMonth,d);
    const tb=ds===today?' style="background:#fffde0"':'';
    const isHoliday=!!HOLIDAYS[ds];
    const sc2=sc||(isHoliday?'su':'');
    html+=`<th class="dh"${tb}><span class="dn ${sc2}">${d}</span><span class="dw ${sc2}">${DJP[dow]}</span></th>`;
  }
  html+='</tr></thead><tbody>';
  for(const row of ROWS){
    html+=`<tr><td class="rh">${row}</td>`;
    for(let d=1;d<=days;d++){
      const ds=toDS(curYear,curMonth,d);
      const tc=ds===today?' tc':'';
      const matched=evArr.filter(e=>e.person===row&&e.dateS<=ds&&(e.dateE||e.dateS)>=ds);
      html+=`<td class="ec${tc}" onclick="openModalCell('${row}','${ds}')">`;
      for(const ev of matched){
        const cls=RCLASS[row]||'eF';
        const comp=ev.companions&&ev.companions.length?'同行: '+ev.companions.join('・'):'';
        const tipTxt=[ev.title,ev.memo,comp].filter(Boolean).join('\n');
        html+=`<span class="ev ${cls}" onclick="event.stopPropagation();editEvent('${ev.id}')" onmouseenter="showTip(event,'${encodeURIComponent(tipTxt)}')" onmouseleave="hideTip()">${ev.title}${ev.memo?' '+ev.memo:''}</span>`;
      }
      html+='</td>';
    }
    html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('cal-table').innerHTML=html;
  document.getElementById('legend').innerHTML=ROWS.map(r=>{
    const c=RCOLORS[r];
    return `<div class="li"><div class="ld" style="background:${c.bg};border:1.5px solid ${c.bd}"></div>${r}</div>`;
  }).join('');
}

function changeMonth(d){
  curMonth+=d;
  if(curMonth>12){curMonth=1;curYear++;}
  if(curMonth<1){curMonth=12;curYear--;}
  renderCalendar();
}

function openModalCell(person,date){
  editingId=null;
  document.getElementById('modal-title').textContent='予定を追加';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('f-title').value='';
  document.getElementById('f-date-s').value=date;
  document.getElementById('f-date-e').value='';
  document.getElementById('f-date-e').min=date;
  document.getElementById('f-person').value=person;
  document.getElementById('f-memo').value='';
  document.querySelectorAll('#cb-companion input').forEach(c=>c.checked=false);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}

function openModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='予定を追加';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('f-title').value='';
  document.getElementById('f-date-s').value=toDS(curYear,curMonth,1);
  document.getElementById('f-date-e').value='';
  document.getElementById('f-date-e').min=toDS(curYear,curMonth,1);
  document.getElementById('f-person').value='';
  document.getElementById('f-memo').value='';
  document.querySelectorAll('#cb-companion input').forEach(c=>c.checked=false);
  document.getElementById('modal-overlay').classList.add('open');
}

function editEvent(id){
  const ev=events[id];if(!ev)return;
  editingId=id;
  document.getElementById('modal-title').textContent='予定を編集';
  document.getElementById('btn-del').style.display='';
  document.getElementById('f-title').value=ev.title||'';
  document.getElementById('f-date-s').value=ev.dateS||'';
  document.getElementById('f-date-e').value=ev.dateE||'';
  document.getElementById('f-date-e').min=ev.dateS||'';
  document.getElementById('f-person').value=ev.person||'';
  document.getElementById('f-memo').value=ev.memo||'';
  document.querySelectorAll('#cb-companion input').forEach(c=>{c.checked=ev.companions&&ev.companions.includes(c.value);});
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

async function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const person=document.getElementById('f-person').value;
  const dateS=document.getElementById('f-date-s').value;
  const dateE=document.getElementById('f-date-e').value||dateS;
  const memo=document.getElementById('f-memo').value.trim();
  const companions=Array.from(document.querySelectorAll('#cb-companion input:checked')).map(c=>c.value);
  if(!title||!person||!dateS){alert('タイトル・担当者・日付は必須です');return;}
  showLoading(true);
  try{
    const data={title,person,dateS,dateE,memo,companions,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(editingId){await db.collection('schedule_events').doc(editingId).set(data);}
    else{await db.collection('schedule_events').add(data);}
    closeModal();
  }catch(e){alert('保存に失敗しました: '+e.message);}
  showLoading(false);
}

async function deleteEvent(){
  if(!editingId)return;
  if(!confirm('この予定を削除しますか？'))return;
  showLoading(true);
  try{await db.collection('schedule_events').doc(editingId).delete();closeModal();}
  catch(e){alert('削除に失敗しました: '+e.message);}
  showLoading(false);
}

function showLoading(v){document.getElementById('loading').className=v?'show':'';}

const tip=document.getElementById('tooltip');
function showTip(e,enc){const t=decodeURIComponent(enc);if(!t)return;tip.textContent=t;tip.style.display='block';moveTip(e);}
function moveTip(e){tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';}
function hideTip(){tip.style.display='none';}
document.addEventListener('mousemove',e=>{if(tip.style.display==='block')moveTip(e);});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

document.getElementById('f-date-s').addEventListener('change',function(){
  const s=this.value;
  const eEl=document.getElementById('f-date-e');
  if(s){
    eEl.min=s;
    if(!eEl.value||eEl.value<s) eEl.value='';
  }
});

const savedCfg=loadConfig();
if(savedCfg&&savedCfg.apiKey&&savedCfg.projectId){initFirebase(savedCfg);}
</script>
</body>
</html>
